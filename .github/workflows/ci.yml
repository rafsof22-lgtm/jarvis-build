name: Free-first CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Python smoke checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile runtime scaffold
        run: python -m compileall jarvis_model_router jarvis_voice_gateway jarvis_command_centre scripts

      - name: Run model-router smoke test
        run: python scripts/smoke_model_router.py

      - name: Validate model routing modes and self-hosted selector
        run: python scripts/verify_model_routing_modes_v2.py

      - name: Validate Jarvis voice command gateway
        run: python scripts/verify_voice_command_gateway_v1.py

      - name: Validate credential and setup automation policy
        run: python scripts/verify_credential_setup_automation_v1.py

      - name: Run cost-governor smoke test
        run: python scripts/smoke_cost_governor.py

      - name: Run zero-spend Tool Registry pilot
        run: python scripts/run_tool_registry_pilot.py

      - name: Validate Sovereign Command Centre and workflow controls
        run: python scripts/smoke_sovereign_controls.py

      - name: Validate dual-layer autonomy and applicability policy
        run: python scripts/smoke_dual_layer_policy.py

      - name: Validate practitioner intelligence and capability universe
        run: python scripts/smoke_practitioner_intelligence.py

      - name: Run redacted configuration-readiness smoke test
        run: python scripts/smoke_config_readiness.py

      - name: Run readiness federation smoke test
        run: python scripts/smoke_readiness_federation.py

      - name: Validate source denominator and module handoffs
        run: python scripts/verify_module_federation.py

      - name: Validate current GitHub environment completion scope
        run: python scripts/verify_environment_completion.py

      - name: Validate universal module, knowledge, OJT and Health specifications
        run: python scripts/verify_universal_module_standard.py

      - name: Validate framework trigger, intelligence and capability-scout controls
        run: python scripts/verify_framework_intelligence_v16.py

      - name: Run zero-spend local Knowledge Fabric pilot
        run: python scripts/run_knowledge_fabric_local_pilot.py

      - name: Validate Knowledge Fabric predeploy controls
        run: python scripts/verify_knowledge_fabric_predeploy_v2.py

      - name: Validate project constitution, continuity and GitHub capability scout
        run: python scripts/verify_project_constitution_and_continuity_v1.py

      - name: Validate completion tranche and screenshot candidate controls
        run: python scripts/verify_completion_tranche_2026_07_21.py

      - name: Validate bounded Health source denominator and safety controls
        run: python scripts/verify_health_source_denominator_v1.py

      - name: Validate XRP HBAR reconciliation batch 002
        run: python scripts/verify_xrp_hbar_batch_002.py

      - name: Generate redacted configuration-readiness report
        run: python scripts/config_readiness.py --root . --output evidence/config-readiness.json

      - name: Run command-centre schema and federation smoke test
        run: python scripts/smoke_command_centre.py

      - name: Generate offline command-centre snapshot
        run: python -m jarvis_command_centre.command_centre --output evidence/command-centre.snapshot.json

      - name: Run deployment readiness dry run
        run: python scripts/deploy_dry_run.py --check-only --target oracle

      - name: Upload pilot evidence
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-cost-routing-pilot
          path: |
            evidence/tool-registry-pilot.json
            evidence/model-routing-modes-v2-verification.json
            evidence/voice-command-gateway-v1-verification.json
            evidence/credential-setup-automation-v1-verification.json
            evidence/config-readiness.json
            evidence/command-centre.snapshot.json
            evidence/module-federation-verification.json
            evidence/environment-completion-verification.json
            evidence/framework-intelligence-v16-verification.json
            evidence/knowledge-fabric-local-pilot.json
            evidence/knowledge-fabric-predeploy-v2-verification.json
            evidence/project-constitution-continuity-v1-verification.json
            evidence/completion-tranche-2026-07-21-verification.json
            evidence/health-source-denominator-v1-verification.json
            evidence/xrp-hbar-batch-002-verification.json
