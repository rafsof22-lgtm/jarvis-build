name: Secret preflight

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  google-secret-preflight:
    name: Google-family secret preflight
    runs-on: ubuntu-latest
    env:
      # GitHub stores repository secret names uppercase even when entered as Google or Google2.
      # Do not print these values.
      GOOGLE_SECRET_RAW: ${{ secrets.GOOGLE }}
      GOOGLE2_SECRET_RAW: ${{ secrets.GOOGLE2 }}

      # Individual candidate presence flags. These are booleans only.
      HAS_GOOGLE: ${{ secrets.GOOGLE != '' }}
      HAS_GOOGLE2: ${{ secrets.GOOGLE2 != '' }}
      HAS_GMAIL: ${{ secrets.GMAIL != '' }}
      HAS_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID != '' }}
      HAS_GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET != '' }}
      HAS_GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN != '' }}
      HAS_GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON != '' }}
      HAS_GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS != '' }}
      HAS_GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID != '' }}
      HAS_GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET != '' }}
      HAS_GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN != '' }}
      HAS_GMAIL_API_KEY: ${{ secrets.GMAIL_API_KEY != '' }}
      HAS_GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_CLIENT_ID != '' }}
      HAS_GOOGLE_DRIVE_CLIENT_SECRET: ${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET != '' }}
      HAS_GOOGLE_CALENDAR_CLIENT_ID: ${{ secrets.GOOGLE_CALENDAR_CLIENT_ID != '' }}
      HAS_GOOGLE_CALENDAR_CLIENT_SECRET: ${{ secrets.GOOGLE_CALENDAR_CLIENT_SECRET != '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Classify Google/Google2 secret bundles without exposing values
        run: python scripts/google_secret_preflight.py
