name: Secret preflight

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  google-secret-preflight:
    name: Google-family secret preflight
    runs-on: ubuntu-latest
    env:
      # User-requested Google-family aliases. Do not print these values.
      GOOGLE_SECRET_RAW: ${{ secrets.GOOGLE || secrets.Google || secrets.GOOGLE2 || secrets.Google2 || secrets.GMAIL || secrets.Gmail }}
      GOOGLE2_SECRET_RAW: ${{ secrets.GOOGLE2 || secrets.Google2 }}

      # Individual candidate presence flags. These are booleans only.
      HAS_GOOGLE: ${{ secrets.GOOGLE != '' }}
      HAS_Google: ${{ secrets.Google != '' }}
      HAS_GOOGLE2: ${{ secrets.GOOGLE2 != '' }}
      HAS_Google2: ${{ secrets.Google2 != '' }}
      HAS_GMAIL: ${{ secrets.GMAIL != '' }}
      HAS_Gmail: ${{ secrets.Gmail != '' }}
      HAS_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID != '' }}
      HAS_GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET != '' }}
      HAS_GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN != '' }}
      HAS_GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON != '' }}
      HAS_GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS != '' }}
      HAS_GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID != '' }}
      HAS_GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET != '' }}
      HAS_GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN != '' }}
      HAS_GMAIL_API_KEY: ${{ secrets.GMAIL_API_KEY != '' }}
      HAS_GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_CLIENT_ID != '' }}
      HAS_GOOGLE_DRIVE_CLIENT_SECRET: ${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET != '' }}
      HAS_GOOGLE_CALENDAR_CLIENT_ID: ${{ secrets.GOOGLE_CALENDAR_CLIENT_ID != '' }}
      HAS_GOOGLE_CALENDAR_CLIENT_SECRET: ${{ secrets.GOOGLE_CALENDAR_CLIENT_SECRET != '' }}
    steps:
      - name: Classify configured secret names without exposing values
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os

          candidates = [
              ("GOOGLE", "Google-family alias"),
              ("Google", "Google-family alias"),
              ("GOOGLE2", "Second Google-family alias"),
              ("Google2", "Second Google-family alias"),
              ("GMAIL", "Gmail alias"),
              ("Gmail", "Gmail alias"),
              ("GOOGLE_CLIENT_ID", "OAuth client id"),
              ("GOOGLE_CLIENT_SECRET", "OAuth client secret"),
              ("GOOGLE_REFRESH_TOKEN", "OAuth refresh token"),
              ("GOOGLE_SERVICE_ACCOUNT_JSON", "Google service account JSON"),
              ("GOOGLE_APPLICATION_CREDENTIALS", "Google credentials reference"),
              ("GMAIL_CLIENT_ID", "Gmail OAuth client id"),
              ("GMAIL_CLIENT_SECRET", "Gmail OAuth client secret"),
              ("GMAIL_REFRESH_TOKEN", "Gmail OAuth refresh token"),
              ("GMAIL_API_KEY", "Gmail API key"),
              ("GOOGLE_DRIVE_CLIENT_ID", "Drive OAuth client id"),
              ("GOOGLE_DRIVE_CLIENT_SECRET", "Drive OAuth client secret"),
              ("GOOGLE_CALENDAR_CLIENT_ID", "Calendar OAuth client id"),
              ("GOOGLE_CALENDAR_CLIENT_SECRET", "Calendar OAuth client secret"),
          ]

          alias_names = {"GOOGLE", "Google", "GOOGLE2", "Google2", "GMAIL", "Gmail"}

          def present(name: str) -> bool:
              return os.getenv(f"HAS_{name}", "false").lower() == "true"

          def classify_shape(raw: str) -> str:
              value = (raw or "").strip()
              if not value:
                  return "missing"
              if value.startswith("{"):
                  try:
                      parsed = json.loads(value)
                  except Exception:
                      return "unknown Google secret format"
                  keys = set(parsed.keys())
                  if parsed.get("type") == "service_account" and {"client_email", "private_key"}.issubset(keys):
                      return "service-account JSON candidate"
                  if {"client_id", "client_secret", "refresh_token"}.issubset(keys):
                      return "OAuth client/refresh-token bundle candidate"
                  if {"api_key"}.issubset(keys) or {"key"}.issubset(keys):
                      return "API-key candidate"
                  return "unknown Google secret format"
              if "\n" not in value and len(value) >= 20:
                  return "API-key candidate"
              return "unknown Google secret format"

          rows = []
          has_any_google_candidate = any(present(name) for name, _ in candidates)

          for name, purpose in candidates:
              status = "present" if present(name) else "missing"
              marker = "alias-present" if present(name) and name in alias_names else status
              rows.append((marker, name, purpose))

          google_shape = classify_shape(os.getenv("GOOGLE_SECRET_RAW", ""))
          google2_shape = classify_shape(os.getenv("GOOGLE2_SECRET_RAW", ""))

          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          with open(summary_path, "a", encoding="utf-8") as summary:
              summary.write("# Secret preflight summary\n\n")
              summary.write("No secret values were printed, logged, deployed, sent, or tested against external APIs.\n\n")
              summary.write("## Google-family aliases\n\n")
              summary.write("| Status | Secret name | Purpose |\n")
              summary.write("|---|---|---|\n")
              for status, name, purpose in rows:
                  summary.write(f"| {status} | `{name}` | {purpose} |\n")
              summary.write("\n## Safe shape detection\n\n")
              summary.write("| Candidate env | Shape |\n")
              summary.write("|---|---|\n")
              summary.write(f"| `GOOGLE_SECRET_RAW` | {google_shape} |\n")
              summary.write(f"| `GOOGLE2_SECRET_RAW` | {google2_shape} |\n")
              summary.write("\n## Safety boundary\n\n")
              summary.write("- Manual workflow only.\n")
              summary.write("- No deployment attempted.\n")
              summary.write("- No paid infrastructure created.\n")
              summary.write("- No email, Slack, Calendar, Drive, or Gmail action sent.\n")
              summary.write("- Presence does not prove validity or runtime permission.\n")

          if not has_any_google_candidate:
              raise SystemExit("No Google-family or conventional Google/Gmail/Drive/Calendar secret was present. Add Google, Google2, an uppercase alias, or an explicit conventional Google secret as a GitHub Actions secret.")
          PY
