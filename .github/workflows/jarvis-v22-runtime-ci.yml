name: Jarvis V22 Runtime Reconciliation

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r runtime/v22/requirements.txt
      - run: python -m pytest -q tests/test_v22_runtime.py
      - run: python -m compileall -q runtime/v22
