name: Jarvis Secret Readiness

on:
  workflow_dispatch:
  schedule:
    - cron: "17 20 * * *"

permissions:
  contents: read

jobs:
  readiness:
    name: Redacted secret presence and safe runtime checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      JARVIS_HEALTH_BASE_URL: ${{ secrets.JARVIS_HEALTH_BASE_URL }}
      JARVIS_HEALTH_MCP_BEARER_TOKEN: ${{ secrets.JARVIS_HEALTH_MCP_BEARER_TOKEN }}
      HUB_STAGING_BASE_URL: ${{ secrets.HUB_STAGING_BASE_URL }}
      VTI_STAGING_BASE_URL: ${{ secrets.VTI_STAGING_BASE_URL }}
      HUB_VTI_EVENT_ENDPOINT: ${{ secrets.HUB_VTI_EVENT_ENDPOINT }}
      VTI_EVENT_SIGNING_SECRET: ${{ secrets.VTI_EVENT_SIGNING_SECRET }}
      PROPERTY_GOOGLE_SHEET_ID: ${{ secrets.PROPERTY_GOOGLE_SHEET_ID }}
      PROPERTY_GOOGLE_SHEETS_WEBHOOK_URL: ${{ secrets.PROPERTY_GOOGLE_SHEETS_WEBHOOK_URL }}
      PROPERTY_GOOGLE_SHEETS_WEBHOOK_SECRET: ${{ secrets.PROPERTY_GOOGLE_SHEETS_WEBHOOK_SECRET }}
      VTI_COBALT_BASE_URL: ${{ secrets.VTI_COBALT_BASE_URL }}
      VTI_COBALT_ACCESS_TOKEN: ${{ secrets.VTI_COBALT_ACCESS_TOKEN }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate redacted readiness report
        run: python scripts/check_github_secret_readiness.py

      - name: Auto-resume eligible harmless staging checks
        run: python scripts/runtime_auto_resume.py --execute

      - name: Write visual summary
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          readiness = json.loads(Path('evidence/github-actions-secret-readiness-v1.json').read_text())
          runtime = json.loads(Path('evidence/runtime-auto-resume-v1.json').read_text())
          icon = '✅' if readiness['status'] == 'READY' else '🚨'
          with open(Path.home() / 'summary.md', 'w', encoding='utf-8') as f:
              f.write(f"# {icon} Jarvis Runtime Readiness\n\n")
              f.write(f"**Secret readiness:** `{readiness['status']}`  \n")
              f.write(f"**Present:** {readiness['summary']['present']} / {readiness['summary']['total_secret_names']}  \n")
              f.write(f"**Runtime auto-resume:** `{runtime['status']}`  \n")
              f.write("**Safety:** read-only checks; no values displayed; no provider mutation.\n\n")
              for group in readiness['groups']:
                  gicon = '✅' if group['state'] == 'READY' else '🟠'
                  f.write(f"## {gicon} {group['group_id']}\n")
                  f.write(f"Tasks: `{', '.join(group['task_ids'])}`\n\n")
                  if group['required_missing']:
                      f.write('### 🚨 HUMAN ACTION REQUIRED\n')
                      for name in group['required_missing']:
                          f.write(f"- Add `{name}` in repository Settings → Secrets and variables → Actions.\n")
                  else:
                      match = next((x for x in runtime['groups'] if x['group_id'] == group['group_id']), None)
                      f.write(f"Runtime check: `{match['state'] if match else 'NOT_MAPPED'}`. Values were not displayed.\n")
                  f.write('\n')
          PY
          cat "$HOME/summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload redacted evidence only
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-runtime-readiness-redacted
          path: |
            evidence/github-actions-secret-readiness-v1.json
            evidence/runtime-auto-resume-v1.json
          retention-days: 30
