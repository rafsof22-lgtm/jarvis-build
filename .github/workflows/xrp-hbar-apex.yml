name: XRP/HBAR Apex Service CI

on:
  push:
    paths:
      - "services/xrp-hbar-apex/**"
      - ".github/workflows/xrp-hbar-apex.yml"
  pull_request:
    paths:
      - "services/xrp-hbar-apex/**"
      - ".github/workflows/xrp-hbar-apex.yml"

permissions:
  contents: read

jobs:
  test-xrp-hbar-apex:
    name: Test isolated XRP/HBAR Apex service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/xrp-hbar-apex
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run tests with retained output
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-output.log

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xrp-hbar-apex-test-output
          path: services/xrp-hbar-apex/test-output.log
          if-no-files-found: error
          retention-days: 7

      - name: Validate Railway setup contract
        env:
          APP_ENV: production
          BASE_URL: https://xrp-hbar-apex.example.invalid
          LOG_LEVEL: info
          MCP_AUTH_MODE: bearer
          MCP_BEARER_TOKEN: ci-contract-placeholder-not-a-secret
        run: npm run railway:check
